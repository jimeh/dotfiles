[battery]
format = '( [$symbol$percentage]($style))'

[[battery.display]]
threshold = 20
style = 'bold red'

[memory_usage]
threshold = 75
symbol = '󰍛 '
format = '( [$symbol${ram}]($style))'
disabled = true

