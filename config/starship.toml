$os\
$fill\
(\
$localip\
$shlvl\
$singularity\
$kubernetes\
$vcsh\
$pijul_channel\
$docker_context\
$package\
$nix_shell\
$pixi\
$conda\
$meson\
$xmake\
$spack\
$aws\
$gcloud\
$helm\
$openstack\
$azure\
$env_var\
$custom\
[ ┬╖](fg:243))\
(\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
