# ------------------------------------------------------------------------------
# jimeh's Starship Config
# ------------------------------------------------------------------------------
# Version: 0.7.0
# URL: https://github.com/jimeh/dotfiles/blob/main/config/starship.toml
# ------------------------------------------------------------------------------
# Two-line Starship (https://starship.rs/) prompt. Line 1 has directory, git
# info, tool/language metadata, user@host, and timestamp. Line 2 has the
# prompt character. Most modules are disabled for easy cherry picking.
# ------------------------------------------------------------------------------

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# ------------------------------------------------------------------------------
# MARK: Format
# ------------------------------------------------------------------------------

add_newline = false

format = """\
(\
$status\
$cmd_duration\
)\
$line_break\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$fossil_branch\
$fossil_metrics\
$hg_state\
$direnv\
$mise\
$nats\
$jobs\
$netns\
$shell\
$memory_usage\
$battery\
$fill\
(\
$localip\
$shlvl\
$singularity\
$kubernetes\
$vcsh\
$pijul_channel\
$docker_context\
$package\
$nix_shell\
$pixi\
$conda\
$meson\
$xmake\
$spack\
$aws\
$gcloud\
$helm\
$openstack\
$azure\
$env_var\
$custom\
[ ·](fg:243))\
(\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$gleam\
$golang\
$guix_shell\
$haskell\
$haxe\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$mojo\
$nim\
$nodejs\
$bun\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
