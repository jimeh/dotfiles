$crystal\
[ ┬╖](fg:243))\
$username\
$hostname\
$container\
$time\
$line_break\
$sudo\
$character\
"""

right_format = """\
$battery\
$cmd_duration\
$status\
"""

# ------------------------------------------------------------------------------
# MARK: Prompt Layout
# ------------------------------------------------------------------------------

[directory]
truncate_to_repo = false
truncation_length = 99
format = '[$path]($style)[$read_only]($read_only_style)'
style = ''
read_only = '≤░Ν╛'
read_only_style = 'bold red'

[fill]
symbol = ' '

[username]
disabled = false
show_always = true
format = '( [$user]($style))'
style_user = 'fg:243'
style_root = 'bold fg:196 bg:52'

[hostname]
disabled = false
ssh_only = false
format = '([@](fg:243)[$hostname]($style))'
style = 'fg:243'

[container]
format = '(:[$symbol \[$name\]]($style))'
style = 'fg:246'
disabled = false

[time]
format = '( [\[](fg:239)[$time]($style)[\]](fg:239))'
style = "bold fg:243"
disabled = false

[line_break]
disabled = false

[sudo]
symbol = 'ΎΙδ '
format = '[$symbol]($style)'
style = 'bold dimmed red'
disabled = false

[character]
success_symbol = '[έζψ](bold fg:118)'
error_symbol = '[έζψ](bold fg:46)'
vimcmd_symbol = '[έζχ](bold fg:46)'

# ------------------------------------------------------------------------------
# MARK: Source Control
# ------------------------------------------------------------------------------

[git_branch]
format = '( [$symbol$branch]($style))'
style = 'fg:51'
symbol = 'ΎΡα'
truncation_length = 24

[git_commit]
tag_symbol = 'ΎΑτ'
format = '[\($hash$tag\)]($style)'
style = 'bold fg:213'
only_detached = true
tag_disabled = false

[git_state]
format = '\[[$state($progress_current/$progress_total)]($style)\]'
style = 'bold fg:208'

[git_metrics]
added_style = 'bold fg:148'
deleted_style = 'bold fg:196'
format = '([\[](fg:51)([+$added]($added_style))([-$deleted]($deleted_style))[\]](fg:51))'
disabled = true

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = 'bold fg:201'
stashed = ''
ahead = "ΎΒλ"
behind = 'ΎΒμ'
modified = '!'
untracked = '?'
diverged = 'ΎΒλΎΒμ'
deleted = 'έεΨ'

[hg_branch]
format = '([$symbol$branch]($style))'
style = 'fg:51'
symbol = 'ΎΡα'
truncation_length = 24

[fossil_branch]
symbol = 'ΎΡα'
format = '( [$symbol$branch]($style))'
disabled = true

[fossil_metrics]
format = '([\[](fg:51)([+$added]($added_style))([-$deleted]($deleted_style))[\]](fg:51))'
disabled = true

[hg_state]
format = '\[[$state($progress_current/$progress_total)]($style)\]'
style = 'bold fg:208'
disabled = true

[pijul_channel]
symbol = 'ΎΡα '
format = '( [$symbol$channel]($style))'
disabled = true

# ------------------------------------------------------------------------------
# MARK: Status & Info
# ------------------------------------------------------------------------------

[shlvl]
symbol = 'ΎΕι '
format = '( [$symbol$shlvl]($style))'
disabled = true

[cmd_duration]
format = '( [\(](fg:242)[$duration]($style)[\)](fg:242))'
style = 'bold fg:220'

[status]
symbol = 'ΎΑΞ'
# success_symbol = 'ΎΑΝ' # enable showing success symbol
not_executable_symbol = 'ΎΣρ'
not_found_symbol = 'ΎΑΓ'
sigint_symbol = 'ΌτΡ'
signal_symbol = '≤▒ΡΜ'
format = '( [\[](fg:239)[$symbol$status]($style)[\]](fg:239))'
style = 'bold red'
success_style = 'bold green'
disabled = false

[jobs]
symbol = 'έεο'
format = '( [$symbol$number]($style))'
style = 'bold blue'
symbol_threshold = 1
number_threshold = 1
disabled = false

[shell]
bash_indicator = ' bsh'
fish_indicator = ' fsh'
zsh_indicator = ' zsh'
powershell_indicator = ' psh'
ion_indicator = " ion"
elvish_indicator = ' esh'
tcsh_indicator = ' tsh'
xonsh_indicator = ' xsh'
cmd_indicator = ' cmd'
nu_indicator = ' nu'
format = '[$indicator]($style)'
disabled = true

[localip]
format = '( @[$localipv4](bold red))'
disabled = true

[os]
format = '( [$symbol]($style))'
disabled = true

[battery]
format = '( [$symbol$percentage]($style))'

[[battery.display]]
threshold = 20
style = 'bold red'

[memory_usage]
threshold = 75
symbol = '≤░Ξδ '
format = '( [$symbol${ram}]($style))'
disabled = true

