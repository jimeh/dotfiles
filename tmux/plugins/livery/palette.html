<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>livery palette</title>
<style>
  :root {
    --bg: #15181d;
    --bg-alt: #20242b;
    --fg: #d7dde7;
    --muted: #8b96a8;
    --subtle: #6f7a8d;
    --border: #343a44;
    --warn: #eed49f;
    --alert: #ed8796;
    --dark: #101216;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 2rem 1.5rem 4rem;
    background: #0c0e11;
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  main { max-width: 960px; margin: 0 auto; }

  h1 { font-size: 1.3rem; margin: 0 0 0.25rem; }
  h2 {
    font-size: 1rem;
    margin: 2.5rem 0 0.75rem;
    color: var(--muted);
    font-weight: 600;
  }
  .intro { color: var(--muted); margin: 0 0 2rem; }

  .swatches {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.6rem;
  }

  .swatch {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
  }
  .swatch .chip { height: 3rem; }
  .swatch .label {
    padding: 0.4rem 0.6rem;
    font-size: 12px;
  }
  .swatch .label .name { color: var(--fg); }
  .swatch .label .hex { color: var(--muted); }

  .preset {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.25rem;
    background: var(--bg);
  }
  .preset h3 {
    margin: 0 0 0.75rem;
    font-size: 0.95rem;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .preset h3 .hexes {
    color: var(--muted);
    font-weight: 400;
    font-size: 12px;
  }

  .pair { display: flex; gap: 0.6rem; margin-bottom: 0.9rem; }
  .pair .chip {
    flex: 1;
    height: 2.2rem;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dark);
    font-size: 12px;
  }

  .statusbar {
    display: flex;
    align-items: stretch;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    white-space: pre;
    font-size: 13px;
    line-height: 2;
  }
  .statusbar .spacer { flex: 1; }

  .seg-host { color: var(--dark); }
  .seg-session { background: var(--bg-alt); color: var(--fg); }
  .statusbar .prefix-dot { color: var(--warn); }
  .seg-tab { color: var(--subtle); }
  .seg-tab-current { }
  .seg-metrics { background: var(--bg-alt); color: var(--fg); }
  .seg-metrics .dot { color: var(--muted); }
  .seg-clock { color: var(--dark); }
  .seg-sync { background: var(--alert); color: var(--dark); }
</style>
</head>
<body>
<main>
  <h1>livery</h1>
  <p class="intro">
    Palette reference for <code>tmux/plugins/livery</code>. Accent
    presets are seeded per-host from <code>#{host_short}</code> and sorted
    by hue below; shared neutrals first.
  </p>

  <h2>Shared colors</h2>
  <div class="swatches">
    <div class="swatch"><div class="chip" style="background:#15181d"></div>
      <div class="label"><div class="name">bg</div><div class="hex">#15181d</div></div></div>
    <div class="swatch"><div class="chip" style="background:#20242b"></div>
      <div class="label"><div class="name">bg_alt</div><div class="hex">#20242b</div></div></div>
    <div class="swatch"><div class="chip" style="background:#d7dde7"></div>
      <div class="label"><div class="name">fg</div><div class="hex">#d7dde7</div></div></div>
    <div class="swatch"><div class="chip" style="background:#8b96a8"></div>
      <div class="label"><div class="name">muted</div><div class="hex">#8b96a8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#6f7a8d"></div>
      <div class="label"><div class="name">subtle</div><div class="hex">#6f7a8d</div></div></div>
    <div class="swatch"><div class="chip" style="background:#343a44"></div>
      <div class="label"><div class="name">border</div><div class="hex">#343a44</div></div></div>
    <div class="swatch"><div class="chip" style="background:#eed49f"></div>
      <div class="label"><div class="name">warn</div><div class="hex">#eed49f</div></div></div>
    <div class="swatch"><div class="chip" style="background:#ed8796"></div>
      <div class="label"><div class="name">alert</div><div class="hex">#ed8796</div></div></div>
    <div class="swatch"><div class="chip" style="background:#101216"></div>
      <div class="label"><div class="name">dark</div><div class="hex">#101216</div></div></div>
  </div>

  <h2>Presets</h2>
  <div id="presets"></div>
</main>

<script>
  const presets = [
    { name: 'aurora', base: '#8aadf4' },
    { name: 'ember',  base: '#f5a97f' },
    { name: 'lagoon', base: '#8bd5ca' },
    { name: 'violet', base: '#c6a0f6' },
    { name: 'moss',   base: '#a6da95' },
    { name: 'slate',  base: '#b7bdf8' },
    { name: 'sky',    base: '#7dc4e4' },
    { name: 'rose',   base: '#f5bde6' },
    { name: 'sand',   base: '#eed49f' },
    { name: 'coral',  base: '#ee99a0' },
    { name: 'lime',   base: '#c8dd88' },
    { name: 'ash',    base: '#a5adcb' },
    { name: 'cherry', base: '#ed8796' },
    { name: 'orchid', base: '#e38dcd' },
    { name: 'jade',   base: '#8cd9b3' },
    { name: 'plum',   base: '#d290df' },
  ];

  // Mirrors mix_color in livery.tmux: base_alt = 60% base over bg.
  function mix(c1, c2, pct) {
    const ch = (s, i) => parseInt(s.slice(i, i + 2), 16);
    const hex = (v) => Math.floor(v).toString(16).padStart(2, '0');
    return '#' + [1, 3, 5].map((i) =>
      hex((ch(c1, i) * pct + ch(c2, i) * (100 - pct)) / 100)).join('');
  }

  function hue(c) {
    const ch = (i) => parseInt(c.slice(i, i + 2), 16) / 255;
    const r = ch(1), g = ch(3), b = ch(5);
    const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
    if (d === 0) return 0;
    let h;
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    return (h * 60 + 360) % 360;
  }

  presets.sort((a, b) => hue(a.base) - hue(b.base));

  const container = document.getElementById('presets');

  for (const p of presets) {
    const alt = mix(p.base, '#15181d', 60);
    const el = document.createElement('div');
    el.className = 'preset';
    el.innerHTML = `
      <h3>${p.name}
        <span class="hexes">base ${p.base} &middot; base_alt ${alt} (derived)</span>
      </h3>
      <div class="pair">
        <div class="chip" style="background:${p.base}">base</div>
        <div class="chip" style="background:${alt}">base_alt</div>
      </div>
      <div class="statusbar"><span class="seg-host" style="background:${p.base}"> noct </span><span class="seg-session"> main <span class="prefix-dot">&#8729; </span></span><span class="spacer"></span><span class="seg-tab"> 1:zsh </span><span class="seg-tab-current" style="color:${p.base}"> 2:vim* </span><span class="seg-tab" style="color:${alt}"> 3:ssh# </span><span class="seg-tab"> 4:htop </span><span class="spacer"></span><span class="seg-sync"> SYNC </span><span> </span><span class="seg-metrics"> CPU 12% <span class="dot">&#8729;</span> MEM 64% </span><span class="seg-clock" style="background:${p.base}"> 14:32 </span></div>
    `;
    container.appendChild(el);
  }
</script>
</body>
</html>
